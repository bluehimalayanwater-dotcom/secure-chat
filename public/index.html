<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>THE VOID — Secret Chat</title>
  <meta name="description" content="You weren't supposed to find this." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Satisfy&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Scanline Overlay ─────────────────────────────────────── -->
  <div class="scanlines"></div>

  <!-- ── Particle Canvas ──────────────────────────────────────── -->
  <canvas id="particles"></canvas>

  <!-- ── Anti-Screenshot Overlay ──────────────────────────────── -->
  <div id="shield-overlay" class="shield-overlay">
    <div class="shield-content">
      <div class="shield-icon">🛡️</div>
      <h2>PROTECTED</h2>
      <p>Content hidden for security</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ── LOGIN VIEW ───────────────────────────────────────────── -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <div id="login-view" class="view active">
    <div class="login-container">
      <!-- Decorative rose -->
      <div class="rose-decoration">
        <svg viewBox="0 0 100 120" class="rose-svg">
          <path d="M50 20 C30 0, 0 20, 20 45 C30 55, 45 50, 50 40 C55 50, 70 55, 80 45 C100 20, 70 0, 50 20Z" fill="url(#roseGrad)" opacity="0.9"/>
          <path d="M50 35 C40 25, 25 30, 35 45 C40 50, 48 48, 50 42 C52 48, 60 50, 65 45 C75 30, 60 25, 50 35Z" fill="url(#roseGrad2)" opacity="0.8"/>
          <path d="M48 55 Q47 80, 45 110" stroke="#2d5a2d" stroke-width="2.5" fill="none"/>
          <path d="M45 75 Q35 65, 30 70" stroke="#2d5a2d" stroke-width="1.5" fill="none"/>
          <path d="M46 90 Q38 82, 32 85" stroke="#2d5a2d" stroke-width="1.5" fill="none"/>
          <defs>
            <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff2d75"/>
              <stop offset="100%" stop-color="#ff6b9d"/>
            </linearGradient>
            <linearGradient id="roseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff4081"/>
              <stop offset="100%" stop-color="#ff80ab"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="login-title">
        <span class="title-cyber">THE</span>
        <span class="title-void">VOID</span>
      </h1>
      <p class="login-subtitle">Enter the secret code to proceed</p>

      <div class="input-group">
        <div class="input-wrapper">
          <input
            type="password"
            id="secret-code"
            placeholder="Enter secret code..."
            autocomplete="off"
            spellcheck="false"
          />
          <div class="input-glow"></div>
        </div>
        <button id="enter-btn" class="neon-btn">
          <span class="btn-text">ENTER THE VOID</span>
          <span class="btn-glitch" aria-hidden="true">ENTER THE VOID</span>
        </button>
      </div>

      <div id="error-msg" class="error-message"></div>

      <p class="login-warning">
        ⚠ All messages are ephemeral. Nothing is stored. Ever.
      </p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ── CHAT VIEW ────────────────────────────────────────────── -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <div id="chat-view" class="view">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <div class="logo-mini">
          <span class="logo-t">T</span><span class="logo-v">V</span>
        </div>
        <div class="header-info">
          <h2 class="room-name">THE VOID</h2>
          <div class="room-status">
            <span class="status-dot"></span>
            <span id="online-count">0</span> in the void
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="user-badge">
          <span class="badge-icon">🌹</span>
          <span id="user-alias" class="badge-alias">???</span>
        </div>
        <button id="leave-btn" class="leave-btn" title="Leave the void">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages Area -->
    <div id="messages-area" class="messages-area">
      <div id="messages-container" class="messages-container">
        <!-- Messages injected here -->
      </div>
      <div id="typing-indicator" class="typing-indicator hidden">
        <span class="typing-alias"></span>
        <span class="typing-dots">
          <span>.</span><span>.</span><span>.</span>
        </span>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="chat-input-wrapper">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message... it will self-destruct 💀"
          autocomplete="off"
          spellcheck="false"
          maxlength="500"
        />
        <button id="send-btn" class="send-btn">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Messages vanish after being seen • No traces left behind</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
